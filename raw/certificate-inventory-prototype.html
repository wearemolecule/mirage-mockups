<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Molecule · Certificate Inventory — Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#1a365d; --navy-700:#13294a; --navy-600:#1d3e68; --navy-50:#eef2f8;
    --ink:#1f2733; --muted:#5a6573; --faint:#8a94a3;
    --line:#e4e8ee; --line-soft:#eef1f5;
    --bg:#f4f5f7; --surface:#ffffff; --surface-2:#fafbfc; --surface-3:#f6f8fa;
    --g-bg:#e7f4ec; --g-tx:#127a46; --g-dot:#1a9d5f;
    --a-bg:#fdf3dd; --a-tx:#8a5a00; --a-dot:#e29009;
    --b-bg:#e8f0fb; --b-tx:#1a4fa0; --b-dot:#2b6fd6;
    --r-bg:#fbe9e9; --r-tx:#a5282c; --r-dot:#d6453a;
    --n-bg:#eef0f3; --n-tx:#626d7a; --n-dot:#9aa4b0;
    --radius:8px; --radius-sm:6px;
    --sh-card:0 1px 2px rgba(16,24,40,.06),0 1px 3px rgba(16,24,40,.05);
    --sh-pop:0 12px 28px rgba(16,24,40,.18),0 2px 6px rgba(16,24,40,.10);
    --mono:'JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{font-family:'Inter',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:var(--ink);-webkit-font-smoothing:antialiased;background:var(--bg);}
  button{font-family:inherit;}
  ::selection{background:#cfe0f5;}

  #app{display:flex;height:100vh;min-width:1040px;overflow:hidden;}

  /* sidebar */
  .sidebar{width:74px;background:var(--navy);flex:0 0 74px;display:flex;flex-direction:column;align-items:center;padding:16px 0;gap:6px;}
  .sidebar .logo{width:34px;height:34px;margin-bottom:18px;}
  .nav-item{width:58px;padding:9px 0 7px;border-radius:9px;display:flex;flex-direction:column;align-items:center;gap:5px;color:#9db4d4;cursor:pointer;transition:.15s;background:none;border:none;}
  .nav-item svg{width:21px;height:21px;stroke:#9db4d4;fill:none;stroke-width:1.7;}
  .nav-item span{font-size:10px;font-weight:500;}
  .nav-item:hover{background:rgba(255,255,255,.07);color:#cfe0f5;}
  .nav-item.active{background:rgba(255,255,255,.13);color:#fff;}
  .nav-item.active svg{stroke:#fff;}
  .sidebar .spacer{flex:1;}
  .avatar{width:30px;height:30px;border-radius:50%;background:#2f5488;color:#cfe0f5;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;}

  .main{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--bg);}
  .topbar{height:60px;background:var(--surface);border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 24px;gap:16px;flex:0 0 60px;}
  .topbar .crumb{font-size:11.5px;color:var(--faint);font-family:var(--mono);}
  .topbar h2{font-size:19px;font-weight:600;letter-spacing:-.015em;margin:-2px 0 0;}
  .gf{margin-left:auto;display:flex;align-items:center;gap:10px;}
  .gfield{display:flex;align-items:center;gap:7px;height:34px;padding:0 11px;border:1px solid var(--line);border-radius:7px;background:#fff;font-size:12.5px;cursor:pointer;}
  .gfield:hover{border-color:#c9d2de;}
  .gfield .lbl{color:var(--faint);font-size:11px;}
  .gfield svg{width:14px;height:14px;stroke:var(--muted);fill:none;stroke-width:1.7;}
  .gfield.year{font-weight:600;}
  .gicon{width:34px;height:34px;border:1px solid var(--line);border-radius:7px;background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;}
  .gicon:hover{border-color:#c9d2de;}
  .gicon svg{width:16px;height:16px;stroke:var(--muted);fill:none;stroke-width:1.7;}

  .tabs{height:44px;background:var(--surface);border-bottom:1px solid var(--line);display:flex;align-items:stretch;padding:0 24px;gap:4px;flex:0 0 44px;}
  .tab{display:flex;align-items:center;gap:8px;padding:0 14px;font-size:13.5px;font-weight:500;color:var(--muted);border-bottom:2px solid transparent;cursor:pointer;margin-bottom:-1px;background:none;border-top:none;border-left:none;border-right:none;}
  .tab:hover{color:var(--ink);}
  .tab.active{color:var(--navy);border-bottom-color:var(--navy);font-weight:600;}
  .tab .badge{background:var(--r-bg);color:var(--r-tx);font-size:11px;font-weight:600;padding:1px 7px;border-radius:20px;font-family:var(--mono);}
  .tab.active .badge{background:var(--navy);color:#fff;}

  .page{flex:1;min-height:0;display:none;flex-direction:column;position:relative;}
  .page.show{display:flex;}

  /* toolbar */
  .toolbar{display:flex;align-items:center;gap:10px;padding:12px 24px;flex-wrap:wrap;}
  .btn{height:34px;padding:0 13px;border-radius:7px;border:1px solid var(--line);background:#fff;color:var(--ink);font-size:12.5px;font-weight:500;display:inline-flex;align-items:center;gap:7px;cursor:pointer;white-space:nowrap;}
  .btn:hover{border-color:#c9d2de;background:var(--surface-2);}
  .btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.8;}
  .btn.primary{background:var(--navy);border-color:var(--navy);color:#fff;}
  .btn.primary:hover{background:var(--navy-600);}
  .btn.primary[disabled]{opacity:.45;cursor:not-allowed;}
  .btn.ghost{border-color:transparent;background:transparent;color:var(--muted);}
  .btn.ghost:hover{background:var(--surface-3);}
  .btn .ts{color:var(--faint);font-size:10.5px;font-weight:400;margin-left:2px;font-family:var(--mono);}
  .btn.primary .ts{color:#a9c2e6;}
  .sep{width:1px;height:24px;background:var(--line);margin:0 2px;}
  .toggle{display:inline-flex;align-items:center;gap:9px;font-size:12px;color:var(--muted);margin-left:auto;}
  .sw{width:118px;height:30px;border-radius:8px;background:var(--surface-3);border:1px solid var(--line);position:relative;display:flex;cursor:pointer;}
  .sw .opt{flex:1;display:flex;align-items:center;justify-content:center;font-size:11.5px;font-weight:600;color:var(--faint);z-index:1;}
  .sw .knob{position:absolute;width:57px;height:26px;border-radius:6px;background:#fff;box-shadow:var(--sh-card);top:1px;left:1px;transition:.18s cubic-bezier(.4,0,.2,1);}
  .sw[data-view="grouped"] .knob{left:60px;}
  .sw[data-view="individual"] .opt:first-child{color:var(--navy);}
  .sw[data-view="grouped"] .opt:last-child{color:var(--navy);}

  .chips{display:flex;align-items:center;gap:8px;padding:0 24px 12px;flex-wrap:wrap;}
  .chip{height:30px;padding:0 10px;border-radius:16px;border:1px solid var(--line);background:#fff;color:var(--muted);font-size:12px;display:inline-flex;align-items:center;gap:6px;cursor:pointer;}
  .chip:hover{border-color:#c9d2de;}
  .chip svg{width:12px;height:12px;stroke:var(--faint);fill:none;stroke-width:2;}
  .chip.on{background:var(--navy-50);border-color:#c9d6ea;color:var(--navy);font-weight:500;}
  .chip .x{color:var(--faint);margin-left:2px;font-weight:600;}
  .chip-label{font-size:11px;color:var(--faint);font-family:var(--mono);margin-right:2px;}

  .gridwrap{margin:0 24px 16px;background:#fff;border:1px solid var(--line);border-radius:var(--radius);overflow:auto;flex:1;min-height:0;}
  table{width:100%;border-collapse:collapse;font-size:12.5px;}
  thead th{background:var(--surface-3);text-align:left;font-weight:600;color:var(--muted);font-size:11px;letter-spacing:.03em;text-transform:uppercase;padding:9px 12px;border-bottom:1px solid var(--line);white-space:nowrap;position:sticky;top:0;z-index:2;cursor:default;}
  th.num,td.num{text-align:right;font-variant-numeric:tabular-nums;font-family:var(--mono);}
  th.sortable{cursor:pointer;} th.sortable:hover{color:var(--ink);}
  tbody td{padding:0 12px;height:46px;border-bottom:1px solid var(--line-soft);white-space:nowrap;vertical-align:middle;}
  tbody tr:hover td{background:var(--surface-2);}
  tbody tr:last-child td{border-bottom:none;}
  td.serial{font-family:var(--mono);font-size:11.5px;color:var(--navy-600);}
  td.mono{font-family:var(--mono);font-size:11.5px;}
  .sub{color:var(--faint);font-size:11px;}
  .link{color:var(--navy);font-weight:500;font-family:var(--mono);font-size:11.5px;cursor:pointer;}
  .link:hover{text-decoration:underline;}
  .dash{color:var(--faint);}
  tr.forecast td{background:repeating-linear-gradient(45deg,#fffdf6,#fffdf6 6px,#fdf7e8 6px,#fdf7e8 12px);}
  tr.forecast td:first-child{box-shadow:inset 3px 0 0 var(--a-dot);}
  tr.forecast:hover td{background:#fdf6e6;}
  tr.exception td{background:#fdf4f4;}
  tr.exception td:first-child{box-shadow:inset 3px 0 0 var(--r-dot);}
  tr.retired td{color:var(--faint);}
  tr.retired td.serial{text-decoration:line-through;color:var(--faint);}
  .rowact{display:flex;gap:4px;justify-content:flex-end;}
  .kebab{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;color:var(--faint);cursor:pointer;border:none;background:none;}
  .kebab:hover{background:var(--surface-3);color:var(--ink);}
  .kebab svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;}
  td.check{width:34px;padding-left:14px;} th.check{width:34px;padding-left:14px;}
  .cbx{width:15px;height:15px;border:1.5px solid #c2cad6;border-radius:4px;cursor:pointer;}
  .chev{width:16px;height:16px;stroke:var(--muted);fill:none;stroke-width:2;transition:transform .15s;cursor:pointer;}
  tr.expanded .chev{transform:rotate(90deg);}
  tr.childrow td{background:var(--surface-3)!important;height:38px;}
  tr.childrow td.serial{padding-left:30px;}

  .pill{display:inline-flex;align-items:center;gap:6px;padding:3px 9px 3px 7px;border-radius:20px;font-size:11px;font-weight:600;}
  .pill .d{width:7px;height:7px;border-radius:50%;}
  .pill.green{background:var(--g-bg);color:var(--g-tx);} .pill.green .d{background:var(--g-dot);}
  .pill.amber{background:var(--a-bg);color:var(--a-tx);} .pill.amber .d{background:var(--a-dot);}
  .pill.blue{background:var(--b-bg);color:var(--b-tx);} .pill.blue .d{background:var(--b-dot);}
  .pill.red{background:var(--r-bg);color:var(--r-tx);} .pill.red .d{background:var(--r-dot);}
  .pill.gray{background:var(--n-bg);color:var(--n-tx);} .pill.gray .d{background:var(--n-dot);}
  .tech{display:inline-flex;align-items:center;gap:6px;}
  .tdot{width:8px;height:8px;border-radius:2px;}
  .tdot.Solar{background:#e0920a;} .tdot.Wind{background:#2b8fd6;} .tdot.Hydro{background:#1aa3a3;} .tdot.Biomass{background:#6a9a3a;}
  .miniact{display:inline-flex;gap:5px;}
  .mb{font-size:10.5px;color:var(--navy);border:1px solid #d4def0;background:var(--navy-50);border-radius:5px;padding:2px 7px;font-weight:500;cursor:pointer;}
  .mb:hover{background:#e2ebf8;}
  .rangecell{font-family:var(--mono);font-size:11.5px;color:var(--navy-600);}

  .footbar{height:42px;flex:0 0 42px;background:var(--surface);border-top:1px solid var(--line);display:flex;align-items:center;padding:0 24px;gap:18px;font-size:12px;color:var(--muted);}
  .footbar .fstat{display:inline-flex;align-items:center;gap:7px;}
  .footbar .fstat b{color:var(--ink);font-variant-numeric:tabular-nums;font-family:var(--mono);font-weight:600;}
  .footbar .fdot{width:8px;height:8px;border-radius:50%;}
  .footbar .attn{margin-left:auto;color:var(--r-tx);font-weight:600;cursor:pointer;}
  .footbar .attn:hover{text-decoration:underline;}

  /* inbox */
  .filterbar{display:flex;align-items:center;gap:10px;padding:12px 24px;flex-wrap:wrap;}
  .split{flex:1;min-height:0;display:flex;border-top:1px solid var(--line);}
  .queue{width:38%;flex:0 0 38%;border-right:1px solid var(--line);overflow:auto;background:var(--surface-2);}
  .qhead{padding:11px 20px;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.03em;border-bottom:1px solid var(--line);background:var(--surface-3);display:flex;align-items:center;gap:8px;position:sticky;top:0;}
  .qhead .qn{margin-left:auto;font-family:var(--mono);color:var(--ink);}
  .qitem{padding:13px 20px;border-bottom:1px solid var(--line-soft);cursor:pointer;border-left:3px solid transparent;}
  .qitem:hover{background:#fff;}
  .qitem.sel{background:#fff;border-left-color:var(--navy);}
  .qtop{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
  .src{font-size:10px;font-weight:600;padding:2px 8px;border-radius:5px;}
  .src.innovo{background:#e8f0fb;color:#1a4fa0;} .src.manual{background:#eef0f3;color:#626d7a;} .src.auto{background:#e7f4ec;color:#127a46;}
  .qtop .age{margin-left:auto;font-size:11px;color:var(--faint);font-family:var(--mono);}
  .qsum{font-size:13px;font-weight:500;margin-bottom:8px;}
  .conf{display:flex;align-items:center;gap:8px;font-size:11.5px;color:var(--muted);}
  .confbar{flex:1;max-width:120px;height:5px;border-radius:4px;background:var(--line);overflow:hidden;}
  .confbar i{display:block;height:100%;}
  .conf .pct{font-family:var(--mono);font-weight:600;}
  .detail{flex:1;min-width:0;overflow:auto;padding:18px 22px;display:flex;flex-direction:column;gap:16px;}
  .attrcard{border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px;background:var(--surface-2);}
  .attrcard .ahead{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
  .attrcard h3{margin:0;font-size:14px;font-weight:600;}
  .attrgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:13px 18px;}
  .attr .k{font-size:10.5px;color:var(--faint);text-transform:uppercase;letter-spacing:.03em;margin-bottom:3px;}
  .attr .v{font-size:13px;font-weight:500;}
  .attr .v.mono{font-family:var(--mono);font-size:11.5px;}
  .sechead{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.03em;display:flex;align-items:center;gap:8px;}
  .sechead .hint{font-family:var(--mono);color:var(--faint);font-weight:500;text-transform:none;}
  .match{display:flex;align-items:center;gap:12px;padding:12px 14px;border:1px solid var(--line);border-radius:var(--radius);background:#fff;}
  .match.top{border-color:#bfe3cd;background:#f4fbf6;}
  .match .star{color:var(--a-dot);}
  .match .mtrade{font-family:var(--mono);font-weight:600;color:var(--navy);font-size:12.5px;}
  .match .mmeta{font-size:12px;color:var(--muted);margin-top:2px;}
  .match .mright{margin-left:auto;display:flex;align-items:center;gap:12px;}
  .confwrap{text-align:right;} .confwrap .pct{font-family:var(--mono);font-weight:700;font-size:14px;} .confwrap .lbl{font-size:10px;color:var(--faint);}
  .targets{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .target{border:1px solid var(--line);border-radius:var(--radius);padding:13px 14px;background:#fff;display:flex;gap:11px;align-items:flex-start;cursor:pointer;}
  .target:hover{border-color:#c9d2de;}
  .target.on{border-color:var(--navy);box-shadow:0 0 0 3px var(--navy-50);}
  .target .ti{width:32px;height:32px;border-radius:8px;background:var(--navy-50);display:flex;align-items:center;justify-content:center;flex:0 0 32px;}
  .target .ti svg{width:17px;height:17px;stroke:var(--navy);fill:none;stroke-width:1.8;}
  .target .tt{font-size:13px;font-weight:600;} .target .td{font-size:11.5px;color:var(--muted);margin-top:2px;line-height:1.35;}
  .picker{border:1px solid #c9d6ea;border-radius:var(--radius);background:var(--navy-50);padding:12px;}
  .picker .psearch{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--line);border-radius:7px;padding:8px 10px;font-size:12px;color:var(--faint);}
  .picker .psearch svg{width:14px;height:14px;stroke:var(--faint);fill:none;stroke-width:2;}
  .presult{display:flex;align-items:center;gap:10px;padding:9px 10px;background:#fff;border:1px solid var(--line);border-radius:7px;margin-top:8px;font-size:12px;cursor:pointer;}
  .presult:hover{border-color:var(--navy);}
  .presult .ptrade{font-family:var(--mono);font-weight:600;color:var(--navy);}
  .presult .pq{margin-left:auto;font-family:var(--mono);color:var(--muted);}
  .actionbar{height:56px;flex:0 0 56px;border-top:1px solid var(--line);background:var(--surface);display:flex;align-items:center;padding:0 22px;gap:10px;}
  .actionbar .right{margin-left:auto;display:flex;gap:8px;}
  .empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--faint);gap:10px;}
  .empty svg{width:44px;height:44px;stroke:#c8d3e0;fill:none;stroke-width:1.5;}

  /* registry steps */
  .steps{display:inline-flex;align-items:center;}
  .step{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:600;padding:3px 9px;border-radius:14px;}
  .step .sd{width:6px;height:6px;border-radius:50%;background:currentColor;}
  .step.done{background:var(--g-bg);color:var(--g-tx);}
  .step.cur{background:var(--b-bg);color:var(--b-tx);}
  .step.wait{background:var(--n-bg);color:var(--n-tx);}
  .step.fail{background:var(--r-bg);color:var(--r-tx);}
  .arrow{color:#c8d0db;margin:0 2px;font-size:11px;}
  .spinner{width:12px;height:12px;border:2px solid var(--b-dot);border-top-color:transparent;border-radius:50%;display:inline-block;animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .errtip{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--r-tx);font-weight:500;cursor:help;}
  .errtip svg{width:13px;height:13px;stroke:var(--r-dot);fill:none;stroke-width:2;}
  .btn.retry{height:28px;padding:0 10px;font-size:11.5px;border-color:#e8b9b9;color:var(--r-tx);}
  .btn.tiny{height:28px;padding:0 10px;font-size:11.5px;}
  .ck svg{width:15px;height:15px;stroke:var(--g-dot);fill:none;stroke-width:2.4;}

  /* overlays */
  #overlay{position:fixed;inset:0;display:none;z-index:50;}
  #overlay.show{display:block;}
  .scrim{position:absolute;inset:0;background:rgba(19,28,45,.34);animation:fade .15s ease;}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .slideover{position:absolute;top:0;right:0;height:100%;width:392px;background:#fff;border-left:1px solid var(--line);box-shadow:-12px 0 32px rgba(16,24,40,.16);display:flex;flex-direction:column;animation:slidein .2s cubic-bezier(.4,0,.2,1);}
  @keyframes slidein{from{transform:translateX(40px);opacity:.6}to{transform:translateX(0);opacity:1}}
  .so-head{height:56px;flex:0 0 56px;display:flex;align-items:center;padding:0 20px;border-bottom:1px solid var(--line);}
  .so-head h3{margin:0;font-size:15px;font-weight:600;}
  .x{margin-left:auto;color:var(--faint);background:none;border:none;cursor:pointer;display:flex;}
  .x:hover{color:var(--ink);}
  .x svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;}
  .so-body{padding:18px 20px;overflow:auto;flex:1;display:flex;flex-direction:column;gap:16px;}
  .field label{display:block;font-size:11.5px;font-weight:600;color:var(--muted);margin-bottom:6px;}
  .req{color:var(--r-tx);}
  textarea,.inp,select.inp{width:100%;border:1px solid var(--line);border-radius:7px;padding:9px 11px;font-size:12.5px;font-family:var(--mono);color:var(--ink);background:#fff;resize:none;}
  textarea:focus,.inp:focus{outline:none;border-color:var(--navy);box-shadow:0 0 0 3px var(--navy-50);}
  .inp.sans,select.inp{font-family:'Inter',sans-serif;}
  .preview{background:var(--g-bg);border:1px solid #bfe3cd;border-radius:7px;padding:10px 12px;font-size:12px;color:var(--g-tx);font-weight:600;display:flex;align-items:center;gap:8px;}
  .preview.warn{background:var(--a-bg);border-color:#ecd39a;color:var(--a-tx);}
  .preview svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .so-foot{padding:14px 20px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end;}

/* ---------------- REGISTRY ---------------- */
function stepHtml(status,err){
  const S1=(c,l,extra='')=>`<span class="step ${c}">${extra}${l}</span>`;
  const dot='<span class="sd"></span>';
  if(status==='confirmed')return `<span class="steps">${S1('done',' Pending',dot)}<span class="arrow">›</span>${S1('done','Submitted',dot)}<span class="arrow">›</span>${S1('done','Confirmed','<span class="ck">'+ICON.check+'</span>')}</span>`;
  if(status==='submitted')return `<span class="steps">${S1('done','Pending',dot)}<span class="arrow">›</span>${S1('cur','Submitted','<span class="spinner"></span>')}<span class="arrow">›</span>${S1('wait','Confirmed',dot)}</span>`;
  if(status==='pending')return `<span class="steps">${S1('cur','Pending',dot)}<span class="arrow">›</span>${S1('wait','Submitted',dot)}<span class="arrow">›</span>${S1('wait','Confirmed',dot)}</span>`;
  if(status==='failed')return `<span class="steps">${S1('done','Pending',dot)}<span class="arrow">›</span>${S1('done','Submitted',dot)}<span class="arrow">›</span>${S1('fail','Failed','<svg viewBox="0 0 24 24" style="width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2.6"><path d="M6 6l12 12M18 6L6 18"/></svg>')}</span>`;
}
function renderRegistry(){
  let html=`<thead><tr><th style="width:300px">Status</th><th>Action</th><th class="num">Certs</th><th>Serial Range</th><th>Counterparty / Beneficiary</th><th>Registry</th><th>Trade</th><th>Submitted</th><th>Confirmed</th><th></th></tr></thead><tbody>`;
  registry.forEach(g=>{
    const cls=g.status==='failed'?'exception':'';
    let confCell = g.status==='confirmed'?`<span class="mono" style="color:var(--g-tx)">${g.conf}</span>`
      : g.status==='failed'?`<span class="errtip" title="${g.err}">${ICON.warn} vintage mismatch</span>`
      : g.status==='pending'?'<span class="dash">—</span>':'<span class="dash">pending…</span>';
    let subCell = g.sub?`<span class="sub mono">${g.sub}</span>`:'<span class="dash">queued</span>';
    let actions = g.status==='failed'?`<div class="rowact" style="gap:6px"><button class="btn retry" data-act="retry:${g.id}"><svg viewBox="0 0 24 24" style="width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:1.8"><path d="M20 11a8 8 0 10-2.3 5.7M20 5v6h-6"/></svg>Retry</button><button class="btn tiny" data-act="noop">Export</button></div>`
      : g.status==='pending'?`<div class="rowact"><button class="btn tiny primary" data-act="submit:${g.id}">Submit now</button></div>`
      : `<div class="rowact"><button class="kebab" data-act="noop">${ICON.kebab}</button></div>`;
    html+=`<tr class="${cls}"><td>${stepHtml(g.status,g.err)}</td><td>${g.action}</td><td class="num">${g.n}</td>
      <td class="mono">${g.range}</td><td>${g.cp}</td><td>${g.reg}</td><td><span class="link">#${g.trade}</span></td>
      <td>${subCell}</td><td>${confCell}</td><td>${actions}</td></tr>`;
  });
  html+='</tbody>';
  $('#reg-table').innerHTML=html;
  const c=registry.filter(g=>g.status==='confirmed').length, f=registry.filter(g=>g.status==='submitted').length,
        q=registry.filter(g=>g.status==='pending').length, fail=registry.filter(g=>g.status==='failed').length;
  $('#reg-foot').innerHTML=`<span class="fstat"><span class="fdot" style="background:var(--g-dot)"></span><b>${c}</b> confirmed</span>
    <span class="fstat"><span class="fdot" style="background:var(--b-dot)"></span><b>${f}</b> in flight</span>
    <span class="fstat"><span class="fdot" style="background:var(--n-dot)"></span><b>${q}</b> queued</span>
    ${fail?`<span class="attn"><b>${fail}</b> failed — action required →</span>`:''}`;
}

function parseRange(str){
  const nums=str.match(/(\d+)\s*(?:to|-|–|→|\.\.\.?)\s*(\d+)/i);
  if(nums){const a=+nums[1],b=+nums[2];if(b>=a&&b-a<100000)return b-a+1;}
  return 0;
}

           <div class="unassigned-big zero">0</div>
           <div style="color:var(--g-tx);font-size:12.5px;font-weight:600">${ICON.check.replace('viewBox','style="width:14px;height:14px;stroke:var(--g-dot);fill:none;stroke-width:2.4;vertical-align:-2px" viewBox')} Fully allocated across 2 targets</div>
           <div style="font-family:var(--mono);font-size:12px;color:var(--muted);margin-top:6px">Adjust the split on the right →</div>
         </div>
       </div>
       <div class="sb-col">
         <div class="sb-colhead">Assign to targets <span class="cnt">2 targets</span></div>
         <div class="sb-list">
           <div class="dropzone active">
             <div class="dz-head"><span class="ti">${ICON.inbound}</span><div><div class="tt">${sp.aLabel}</div><div class="td">${sp.aDesc}</div></div>
               <div class="stepper"><button data-act="split-dec" ${tA<=0?'disabled':''}>−</button><span class="val">${tA}</span><button data-act="split-inc" ${tA>=sp.total?'disabled':''}>+</button></div></div>
           </div>
           <div class="dropzone">
             <div class="dz-head"><span class="ti">${ICON.retirement}</span><div><div class="tt">${sp.bLabel}</div><div class="td">${sp.bDesc}</div></div>
               <div class="stepper"><button data-act="split-inc" ${tB<=0?'disabled':''}>−</button><span class="val">${tB}</span><button data-act="split-dec" ${tB>=sp.total?'disabled':''}>+</button></div></div>
           </div>
           <div class="dropzone" style="border-style:dashed;text-align:center;color:var(--faint)"><div style="font-size:12px;padding:6px 0;font-family:var(--mono)">+ Add another target</div></div>
         </div>
       </div>
     </div>
     <div class="m-foot"><span style="margin-right:auto;font-size:12px;color:var(--muted);font-family:var(--mono)">${tA} + ${tB} = ${sp.total} allocated</span><button class="btn" data-act="ov-close">Cancel</button><button class="btn primary" data-act="split-apply">Apply Split</button></div>
   </div>`);
}

/* ---------------- FLOATING MENU ---------------- */
function openMenu(anchor,items){
  const m=$('#menu');
  m.innerHTML=items.map(it=>it.sep?'<div class="menu-sep"></div>':
    `<div class="mi ${it.danger?'danger':''} ${it.check?'check':''} ${it.on?'on':''}" data-mi="${it.id}">${it.icon||''}<span>${it.label}</span>${it.check?'<span class="tick">✓</span>':''}</div>`).join('');
  const r=anchor.getBoundingClientRect();
  m.style.left=Math.min(r.left,window.innerWidth-210)+'px';
  m.style.top=(r.bottom+6)+'px';
  m.classList.add('show');
  m._items=items;
}
function closeMenu(){$('#menu').classList.remove('show');}

function filterMenu(dim){
  const opts={status:['Available','Forecast','Allocated','Exception','Retired'],
    registry:['M-RETS','WREGIS','PJM-GATS','NAR','ERCOT'],
    technology:['Solar','Wind','Hydro','Biomass'],
    vintage:['2023','2024','2025']};
  const cur=S.pfFilters[dim];
  const items=[{id:'__all',label:'All',check:true,on:!cur}];
  opts[dim].forEach(o=>items.push({id:o,label:o,check:true,on:cur==o}));
  return items;
}

/* ---------------- EVENT ROUTER ---------------- */
document.addEventListener('click',e=>{
  // menu item pick
  const mi=e.target.closest('[data-mi]');
  if(mi){ handleMenuPick(mi.dataset.mi); return; }
  if($('#menu').classList.contains('show')&&!e.target.closest('#menu')) closeMenu();

  const el=e.target.closest('[data-act],[data-nav]');
  if(!el)return;
  if(el.dataset.nav){ S.nav=el.dataset.nav; $$('.nav-item').forEach(n=>n.classList.toggle('active',n.dataset.nav===S.nav)); showTab(); return; }
  const act=el.dataset.act; const [cmd,arg]=act.split(':');

  switch(cmd){
    case 'tab': S.nav='inventory'; $$('.nav-item').forEach(n=>n.classList.toggle('active',n.dataset.nav==='inventory')); S.tab=arg; renderTabs(); showTab(); break;
    case 'back-inv': S.nav='inventory'; $$('.nav-item').forEach(n=>n.classList.toggle('active',n.dataset.nav==='inventory')); showTab(); break;
    case 'toggle-view': S.view=S.view==='individual'?'grouped':'individual'; renderPortfolio(); break;
    case 'expand': S.expanded.has(arg)?S.expanded.delete(arg):S.expanded.add(arg); renderGrouped(); break;
    case 'add-cert': openCertModal(null); break;
    case 'add-range': openSlideover(); break;
    case 'bulk': toast('CSV uploader opened — drop a file to stage certificates'); break;
    case 'sync': $('#sync-ts').textContent='· just now'; toast('Synced from Innovo — 3 new batches in Matching Inbox'); break;
    case 'kebab': { const i=+arg; const c=certs[i];
      openMenu(el,[
        {id:'edit:'+i,label:'Edit certificate',icon:'<svg viewBox="0 0 24 24"><path d="M11 4H4v16h16v-7M18.5 2.5a2.1 2.1 0 013 3L12 15l-4 1 1-4z"/></svg>'},
        {id:'links:'+i,label:'View linked trade',icon:'<svg viewBox="0 0 24 24"><path d="M10 13a5 5 0 007 0l3-3a5 5 0 00-7-7l-1 1M14 11a5 5 0 00-7 0l-3 3a5 5 0 007 7l1-1"/></svg>'},
        {sep:true},
        {id:'transfer:'+i,label:'Transfer…',icon:ICON.outbound},
        {id:'retire:'+i,label:'Retire certificate',danger:true,icon:'<svg viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg>'},
      ]); break; }
    case 'filter': openMenu(el,filterMenu(arg)); $('#menu')._dim=arg; break;
    case 'clear': S.pfFilters[arg]=null; closeMenu(); renderPortfolio(); break;
    case 'ract': toast(arg+' range — action staged'); break;
    case 'isel': S.selInbox=arg; S.selTarget=null; renderInbox(); break;
    case 'target': S.selTarget=S.selTarget===arg?null:arg; renderInboxDetail(); break;
    case 'accept': acceptInbox('#'+arg); break;
    case 'accept-top': { const it=inbox.find(x=>x.id===S.selInbox); acceptInbox(it&&it.matches[0]?'#'+it.matches[0].trade:'suggested match'); break; }
    case 'dismiss': removeInbox('dismissed'); break;
    case 'snooze': removeInbox('snoozed for 24h'); break;
    case 'rerun': toast('Re-running auto-match across 23 batches…'); break;
    case 'split-open': openSplit(); break;
    case 'split-inc': S.split.a=Math.min(S.split.total,S.split.a+1); renderSplit(); break;
    case 'split-dec': S.split.a=Math.max(0,S.split.a-1); renderSplit(); break;
    case 'split-apply': { const id=S.split.itemId; closeOverlay(); inbox=inbox.filter(x=>x.id!==id); if(S.selInbox===id)S.selInbox=inbox[0]?.id; renderTabs(); renderInbox(); toast('Batch split applied across 2 targets'); break; }
    case 'retry': retryRegistry(arg); break;
    case 'submit': submitRegistry(arg); break;
    case 'refresh-reg': toast('Registry statuses refreshed'); renderRegistry(); break;
    case 'menu-year': openMenu(el,[{id:'y:2023',label:'2023',check:true,on:$('#year-val').textContent==='2023'},{id:'y:2024',label:'2024',check:true,on:$('#year-val').textContent==='2024'},{id:'y:2025',label:'2025',check:true,on:$('#year-val').textContent==='2025'}]); $('#menu')._dim='year'; break;
    case 'menu-asof': toast('As-of date picker — defaults to today'); break;
    case 'search': toast('Serial search — type to filter the grid'); break;
    case 'save-cert': closeOverlay(); toast('Certificate saved'); if(S.tab==='portfolio')renderPortfolio(); break;
    case 'save-range': { const n=parseRange($('#range-in')?.value||'')||50; closeOverlay(); toast(n+' certificates added to inventory'); break; }
    case 'ov-close': closeOverlay(); break;
    case 'noop': break;
  }
});
function handleMenuPick(id){
  const dim=$('#menu')._dim;
  if(id.startsWith('y:')){ $('#year-val').textContent=id.slice(2); S.pfFilters.vintage=id.slice(2); closeMenu(); if(S.tab==='portfolio')renderPortfolio(); toast('Year set to '+id.slice(2)); return; }
  if(dim&&S.pfFilters.hasOwnProperty(dim)){
    S.pfFilters[dim]= id==='__all'?null:id; closeMenu(); renderPortfolio(); return;
  }
  // kebab actions
  const [c,arg]=id.split(':');
  closeMenu();
  if(c==='edit'){ openCertModal(+arg); }
  else if(c==='retire'){ certs[+arg].st='Retired'; certs[+arg].subleg='Retirement · queued'; renderPortfolio(); toast('Certificate retired'); }
  else if(c==='transfer'){ toast('Transfer drafted — see Registry Activity'); }
  else if(c==='links'){ S.tab='portfolio'; toast('Linked to Trade #'+(certs[+arg].trade||'—')); }
}
function acceptInbox(label){ const id=S.selInbox; inbox=inbox.filter(x=>x.id!==id); S.selInbox=inbox[0]?.id||null; S.selTarget=null; renderTabs(); renderInbox(); toast('Matched to '+label+' — moved to Registry queue'); }
function removeInbox(verb){ const id=S.selInbox; inbox=inbox.filter(x=>x.id!==id); S.selInbox=inbox[0]?.id||null; S.selTarget=null; renderTabs(); renderInbox(); toast('Batch '+verb); }
function retryRegistry(id){ const g=registry.find(x=>x.id===id); if(!g)return; g.status='submitted'; g.sub='May 12 · just now'; g.err=null; renderRegistry(); toast('Resubmitted to '+g.reg+'…'); setTimeout(()=>{ g.status='confirmed'; g.conf='just now'; renderRegistry(); toast('Retirement confirmed by '+g.reg); },1800); }
function submitRegistry(id){ const g=registry.find(x=>x.id===id); if(!g)return; g.status='submitted'; g.sub='May 12 · just now'; renderRegistry(); toast('Submitted to '+g.reg); setTimeout(()=>{ g.status='confirmed'; g.conf='just now'; renderRegistry(); toast('Confirmed by '+g.reg); },1800); }

document.addEventListener('keydown',e=>{ if(e.key==='Escape'){ closeMenu(); closeOverlay(); }});
window.addEventListener('resize',()=>closeMenu());

/* ---------------- BOOT ---------------- */
renderTabs(); showTab();
</script>
</body>
</html>
