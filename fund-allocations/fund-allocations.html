<script>
// ─── Data ─────────────────────────────────────────────────────────────────────
const COLORS = ['var(--c0)','var(--c1)','var(--c2)','var(--c3)'];

/// Mapping rules: book → SMA account lines (including historical retired entries)
const BOOK_RULES = {
  '#GH5600': [
    { fcm:'Morgan Stanley', acctNum:'MS-5758778',  target:.30, ci:0, status:'active',  effectiveFrom:'Jan 1, 2026' },
    { fcm:'JP Morgan',      acctNum:'JPM-568767',  target:.30, ci:1, status:'active',  effectiveFrom:'Jan 1, 2026' },
    { fcm:'Goldman Sachs',  acctNum:'GS-456456',   target:.40, ci:2, status:'active',  effectiveFrom:'Jan 1, 2026' },
    { fcm:'Morgan Stanley', acctNum:'MS-5758778',  target:.25, ci:0, status:'retired', effectiveFrom:'Jul 1, 2025', effectiveTo:'Dec 31, 2025' },
  ],
  '#GH5601': [
    { fcm:'Morgan Stanley', acctNum:'MS-5758778',  target:.50, ci:0, status:'active', effectiveFrom:'Jan 1, 2026' },
    { fcm:'Goldman Sachs',  acctNum:'GS-456456',   target:.50, ci:2, status:'active', effectiveFrom:'Jan 1, 2026' },
  ],
  '#GH5603': [
    { fcm:'Citadel Securities', acctNum:'CIT-88234',  target:.45, ci:0, status:'active', effectiveFrom:'Jan 1, 2026' },
    { fcm:'Barclays',           acctNum:'BAR-44512',  target:.35, ci:1, status:'active', effectiveFrom:'Jan 1, 2026' },
    { fcm:'Morgan Stanley',     acctNum:'MS-5758778', target:.20, ci:2, status:'active', effectiveFrom:'Jan 1, 2026' },
  ],
};

/** Short scope line next to strip card title — same labels as AUM Derived Ratios nested cards */
const BOOK_SCOPE_SUBTITLE = {
  '#GH5600': 'Natural Gas / WTI',
  '#GH5601': 'Henry Hub',
  '#GH5603': 'WTI Crude Oil',
};

// ─── Allocations strip (`.fa-alloc-strip-scroll`) — reusable HTML builders ────
const ALLOC_STRIP_UI = {
  statusDot: {
    pending: { dot: 'var(--fa-pending-amber)', fg: 'var(--fa-pending-amber)' },
    ok: { dot: 'var(--color-green)', fg: 'var(--muted)' },
  },
};

function allocStripQuoteAttr(s) {
  return String(s).replace(/'/g, "\\'");
}

function allocStripInputStyle(color) {
  return `width:44px;text-align:right;box-sizing:border-box;border:1px solid var(--input-border);border-radius:3px;background:transparent;font-family:var(--font);font-size:.72rem;font-variant-numeric:tabular-nums;padding:1px 4px;color:${color};outline:none`;
}

/** Double-quoted HTML attribute value (e.g. input value="…") */
function allocStripEscapeInputValueAttr(s) {
  return String(s).replace(/&/g, '&amp;').replace(/"/g, '&quot;');
}

/** @param {boolean} monthSep  thicker top rule when starting a new month block */
function allocStripMonthSepClass(monthSep) {
  return monthSep ? ' alloc-strip-month-sep' : '';
}

function allocStripTradeMenuEmptyCell(monthSep) {
  const ms = allocStripMonthSepClass(!!monthSep);
  return `<td class="trades-col-menu alloc-strip-trade-menu-td${ms}" onclick="event.stopPropagation()"></td>`;
}

function allocStripTradeMenuCell(orderId, monthSep) {
  const ms = allocStripMonthSepClass(!!monthSep);
  const idAttr = allocStripEscapeInputValueAttr(String(orderId));
  return `<td class="trades-col-menu alloc-strip-trade-menu-td${ms}" onclick="event.stopPropagation()"><div class="fa-strip-trade-menu-wrap" data-strip-order-id="${idAttr}"><button type="button" class="trades-row-menu-btn fa-strip-trade-menu-btn" aria-label="Row actions" aria-expanded="false" aria-haspopup="true" onclick="faStripTradeRowMenuToggle(event,this)"><i class="fas fa-ellipsis-vertical" aria-hidden="true"></i></button><div class="fa-strip-trade-menu-dropdown" role="menu"><button type="button" role="menuitem" class="action-btn" onclick="faStripTradeMenuMakeIndependent(this)">Make Independent</button></div></div></td>`;
}

function faStripTradeRowMenuToggle(e, btn) {
  e.stopPropagation();
  const wrap = btn.closest('.fa-strip-trade-menu-wrap');
  const dd = wrap && wrap.querySelector('.fa-strip-trade-menu-dropdown');
  if (!dd) return;
  const wasOpen = dd.classList.contains('open');
  document.querySelectorAll('.fa-strip-trade-menu-dropdown.open').forEach(el => {
    el.classList.remove('open');
    el.closest('.fa-strip-trade-menu-wrap')?.querySelector('.fa-strip-trade-menu-btn')?.setAttribute('aria-expanded', 'false');
  });
  if (!wasOpen) {
    dd.classList.add('open');
    btn.setAttribute('aria-expanded', 'true');
  }
}

function faStripTradeMenuCloseFromWrap(wrap) {
  if (!wrap) return;
  wrap.querySelector('.fa-strip-trade-menu-dropdown')?.classList.remove('open');
  wrap.querySelector('.fa-strip-trade-menu-btn')?.setAttribute('aria-expanded', 'false');
}

function faStripTradeMenuMakeIndependent(fromEl) {
  const wrap = fromEl.closest('.fa-strip-trade-menu-wrap');
  faStripTradeMenuCloseFromWrap(wrap);
  const id = wrap?.getAttribute('data-strip-order-id');
  if (id == null || id === '') return;
  const ok = window.confirm(
    `Make trade ${id} independent? It will be removed from this strip.`
  );
  if (!ok) return;
  faAllocStripMakeIndependentClick(id);
}

document.addEventListener('click', function faStripTradeMenuDocClick(e) {
  if (e.target.closest('.fa-strip-trade-menu-wrap')) return;
  document.querySelectorAll('.fa-strip-trade-menu-dropdown.open').forEach(el => {
    el.classList.remove('open');
    el.closest('.fa-strip-trade-menu-wrap')?.querySelector('.fa-strip-trade-menu-btn')?.setAttribute('aria-expanded', 'false');
  });
});

/**
 * Leftover = Total column lots minus sum of FCM account lots for the row (signed balance).
 * @param {{ tradeRow?: boolean }} [opts] tradeRow: always "-" in the cell (detail rows); title/color still reflect imbalance.
 */
function allocStripLeftoverCell(diff, monthSep, opts) {
  const tradeRow = Boolean(opts && opts.tradeRow);
  const ms = allocStripMonthSepClass(monthSep);
  const n = Math.round(Number(diff)) || 0;
  if (tradeRow) {
    const spanCls =
      n === 0 ? 'alloc-strip-leftover-ok' : n > 0 ? 'alloc-strip-leftover-warn' : 'alloc-strip-leftover-bad';
    const title =
      n === 0
        ? 'Balanced: Total equals FCM sum'
        : n > 0
          ? `${n} lot${n === 1 ? '' : 's'} unallocated (Total exceeds FCM sum)`
          : `${-n} lot${-n === 1 ? '' : 's'} over-allocated (FCM sum exceeds Total)`;
    const titleAttr = allocStripEscapeInputValueAttr(title);
    return `<td class="r mono alloc-strip-leftover-td alloc-strip-leftover-td--num alloc-strip-leftover-td--dash${ms}"><span class="${spanCls}" title="${titleAttr}">-</span></td>`;
  }
  const spanCls =
    n === 0 ? 'alloc-strip-leftover-ok' : n > 0 ? 'alloc-strip-leftover-warn' : 'alloc-strip-leftover-bad';
  const title =
    n === 0
      ? 'Balanced: Total equals FCM sum'
      : n > 0
        ? `${n} lot${n === 1 ? '' : 's'} unallocated (Total exceeds FCM sum)`
        : `${-n} lot${-n === 1 ? '' : 's'} over-allocated (FCM sum exceeds Total)`;
  const titleAttr = allocStripEscapeInputValueAttr(title);
  return `<td class="r mono alloc-strip-leftover-td alloc-strip-leftover-td--num${ms}"><span class="${spanCls}" title="${titleAttr}">${n}</span></td>`;
}

/** Striping inside an expanded block: 0 = base (first row after parent), 1 = alt, … */
function allocStripExpStripeClass(localIndex) {
  return localIndex % 2 === 0 ? 'alloc-strip-exp-base' : 'alloc-strip-exp-alt';
}

function allocStripStatusDot(text, dotColor, textColor) {
  return `<span class="alloc-strip-status-dot"><span class="b-dot" style="background:${dotColor}"></span><span class="alloc-strip-status-label" style="color:${textColor}">${text}</span></span>`;
}

function allocStripAggregateStatusHtml(hasPending) {
  const { pending, ok } = ALLOC_STRIP_UI.statusDot;
  if (hasPending) return allocStripStatusDot('Unfinalized', pending.dot, pending.fg);
  return allocStripStatusDot('Finalized', ok.dot, ok.fg);
}

/** Fill trades column: clickable count opens modal (parent summary rows only). */
function allocStripFillTradesCellHtml(book, monthLabel, prod, count, monthSep) {
  const ms = monthSep === true ? allocStripMonthSepClass(true) : '';
  if (!count) {
    return `<td class="r mono alloc-strip-fill-trades-cell alloc-strip-fill-trades-cell--empty${ms}">—</td>`;
  }
  const esc = s => String(s).replace(/\\/g, '\\\\').replace(/'/g, "\\'");
  const b = esc(book);
  const m = esc(monthLabel);
  const p = esc(prod);
  const label = count === 1 ? '1 fill trade' : count + ' fill trades';
  return (
    `<td class="r mono alloc-strip-fill-trades-cell${ms}">` +
    `<button type="button" class="alloc-strip-fill-trades-count-btn" ` +
    `onclick="event.stopPropagation(); faAllocOpenFillTradesModal('${b}', '${m}', '${p}')" ` +

/** Orders in one strip parent cell (book + month row + product). */
function allocStripOrdersInCell(book, monthLabel, prod) {
  const out = [];
  orders.forEach(o => {
    if (o.book !== book) return;
    if (String(o.short.split(' ')[0]) !== String(prod)) return;
    if (!getMonthLabels(o).includes(monthLabel)) return;
    out.push(o);
  });
  return out;
}

/** Fill trade rows for a finalized parent summary cell (all FCMs, all parent orders). */
function allocStripCollectFillsForCell(ordersInCell, monthLabel, activeRules) {
  if (!allocStripParentRowUsesFinalizedFcmCells(ordersInCell)) return [];
  const rows = [];
  ordersInCell.forEach(o => {
    if (!Array.isArray(o.fills)) return;
    o.fills.forEach(f => {
      if (!f.tradeId) return;
      if (!allocStripFillContractMatchesMonth(f.contract, o, monthLabel)) return;
      const rule = activeRules.find(r => r.acctNum === f.acctNum);
      rows.push({
        tradeId: f.tradeId,
        parentOrderId: o.id,
        book: o.book,
        month: monthLabel,
        product: o.short.split(' ')[0],
        fcm: f.fcm,
        acctNum: f.acctNum,
        ci: f.ci != null ? f.ci : rule ? rule.ci : 0,
        dir: f.dir || o.dir,
        qty: f.qty,
        entryPx: f.entryPx,
      });
    });
  });
  rows.sort((a, b) => {
    const ac = String(a.acctNum).localeCompare(String(b.acctNum));
    if (ac !== 0) return ac;
    return String(a.tradeId).localeCompare(String(b.tradeId));
  });
  return rows;
}

function faAllocRenderFillTradesModalTable(rows) {
  const tbody = document.getElementById('fa-alloc-fill-trades-tbody');
  if (!tbody) return;
  if (!rows.length) {
    tbody.innerHTML = `<tr><td colspan="6" class="fa-alloc-fill-trades-empty">No fill trades for this row.</td></tr>`;
    return;
  }
  tbody.innerHTML = rows
    .map(r => {
      const c = COLORS[r.ci] != null ? COLORS[r.ci] : 'var(--muted)';
      const px =
        r.entryPx != null && !Number.isNaN(Number(r.entryPx))
          ? Number(r.entryPx).toFixed(4)
          : '—';
      return (
        `<tr>` +
        `<td class="trades-cell-id">${allocStripEscapeHtml(r.tradeId)}</td>` +
        `<td class="trades-cell-id">${allocStripEscapeHtml(r.parentOrderId)}</td>` +
        `<td style="color:${c};font-weight:600">${allocStripEscapeHtml(r.acctNum)}</td>` +
        `<td>${allocStripEscapeHtml(r.dir)}</td>` +
        `<td class="trades-col-num">${allocStripEscapeHtml(String(r.qty))}</td>` +
        `<td class="trades-col-num">${allocStripEscapeHtml(px)}</td>` +
        `</tr>`
      );
    })
    .join('');
}

function faAllocFillTradesModalTitleHtml(book, monthLabel, prod) {
  const sym = allocStripEscapeHtml(String(prod || '—'));

  return (

function faAllocFillTradesModalTitlePlain(book, monthLabel, prod) {
  return `Fill Trades for ${book} ${monthLabel} [${prod}]`;
}

function faAllocOpenFillTradesModal(book, monthLabel, prod) {
  const modal = document.getElementById('modal-fa-alloc-fill-trades');
  if (!modal) return;
  const activeRules = (BOOK_RULES[book] || []).filter(r => r.status !== 'retired');
  const ordersInCell = allocStripOrdersInCell(book, monthLabel, prod);
  const rows = allocStripCollectFillsForCell(ordersInCell, monthLabel, activeRules);
  const title = document.getElementById('fa-alloc-fill-trades-title');
  const card = modal.querySelector('.modal-card--fa-alloc-fill-trades');
  if (title) title.innerHTML = faAllocFillTradesModalTitleHtml(book, monthLabel, prod);
  if (card) card.setAttribute('aria-label', faAllocFillTradesModalTitlePlain(book, monthLabel, prod));
  faAllocRenderFillTradesModalTable(rows);
  modal.style.display = 'flex';
}

function faAllocCloseFillTradesModal() {
  const modal = document.getElementById('modal-fa-alloc-fill-trades');
  if (modal) modal.style.display = 'none';
}

/** Parse mock trade `price` like `3.2650 $/MMBtu` into numeric string and unit. */
function allocStripParseTradePrice(priceStr) {
  const pm = String(priceStr || '').match(/^([\d.]+)\s+(.+)$/);
  return pm ? { num: pm[1], unit: pm[2].trim() } : { num: null, unit: null };
}

/** UOM columns: strip price-style "$/" prefix (e.g. "$/MMBtu" → "MMBtu"). */
function faUomColumnDisplay(uom) {
  if (uom == null || uom === '') return '';
  const s = String(uom).trim();
  if (!s || s === '—') return s;
  const stripped = s.replace(/^\$\/\s*/i, '').trim();
  return stripped || s;
}

function allocStripAvgNumHtml(avgPx) {
  if (avgPx != null) {
    return `<span class="mono alloc-strip-avg-num">${avgPx.toFixed(4)}</span>`;
  }
  return `<span class="alloc-strip-avg-empty">—</span>`;
}

function allocStripUomHtml(wUnit) {
  if (!wUnit) return '—';
  const d = faUomColumnDisplay(wUnit);
  return d ? allocStripEscapeHtml(d) : '—';
}

function allocStripExpandIcon(expanded) {
  /* Collapsed: ▶ right · Expanded: ⌄ down */
  const d = expanded ? 'M6 9l6 6 6-6' : 'M9 18l6-6-6-6';
  return `<svg class="alloc-strip-expand-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="${d}"/></svg>`;
}

/** Double-quoted HTML attributes (e.g. aria-label, data-fa-book-card) */
function allocStripEscapeAttr(s) {
  return String(s ?? '')
    .replace(/&/g, '&amp;')
    .replace(/"/g, '&quot;');
}

function allocStripEscapeHtml(s) {
  return String(s ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

/** AUM label for strip band row — matches AUM_DATA.aum scale (millions → $450M). */
function allocStripAumDollarLabel(acctNum) {
  const m = typeof AUM_DATA !== 'undefined' ? AUM_DATA[acctNum]?.aum : null;
  if (m == null || m === '' || Number.isNaN(Number(m))) return '—';
  return '$' + m + 'M';
}

function allocStripFcmBandTh(rule) {
  const c = COLORS[rule.ci];
  const d = typeof AUM_DATA !== 'undefined' ? (AUM_DATA[rule.acctNum] || { client: rule.fcm, aum: 0 }) : { client: rule.fcm };
  const client = allocStripEscapeHtml(d.client || rule.fcm || '');
  const acct = allocStripEscapeHtml(rule.acctNum);
  const aumLabel = allocStripEscapeHtml(allocStripAumDollarLabel(rule.acctNum));
  const bullet = '<span class="fa-aum-fcm-key-sep" aria-hidden="true"> • </span>';
  return (
    `<th class="r alloc-strip-col-rsep fa-fcm-acct-th fa-fcm-acct-th--strip alloc-strip-fcm-col fa-fcm-acct-th--accent-var" style="--fa-fcm-accent:${c}">` +
    `<span class="alloc-strip-fcm-band-line">` +
    `<span class="alloc-strip-fcm-band-name">${client}</span>${bullet}` +
    `<span class="fa-fcm-key-muted">${acct}</span>${bullet}` +
    `<span class="fa-fcm-key-muted">${aumLabel}</span>` +
    `</span></th>`
  );
}

function allocStripFcmHeaderTh(rule) {
  const c = COLORS[rule.ci];
  return `<th class="r alloc-strip-col-rsep fa-fcm-acct-th fa-fcm-acct-th--strip alloc-strip-fcm-col fa-fcm-acct-th--accent-var" style="--fa-fcm-accent:${c}">${rule.acctNum}</th>`;
}

/** True on fund-allocations.html only: single thead row + FCM key above grid (main.html keeps two-row thead). */
function allocStripUseCompactFcmStripHeader() {
  return typeof document !== 'undefined' && document.body.classList.contains('fa-fund-alloc-embedded-strip');
}

/** One-line color key: dot + Name • acct# • $AUM per account (matches AUM book cards). */
function allocStripFcmKeyHtml(activeRules) {
  const items = activeRules.map((rule) => {
    const c = COLORS[rule.ci];
    const d = typeof AUM_DATA !== 'undefined' ? (AUM_DATA[rule.acctNum] || { client: rule.fcm, aum: 0 }) : { client: rule.fcm };
    const client = allocStripEscapeHtml(d.client || rule.fcm || '');
    const acct = allocStripEscapeHtml(rule.acctNum);
    const aum = allocStripEscapeHtml(allocStripAumDollarLabel(rule.acctNum));
    const bullet = '<span class="fa-aum-fcm-key-sep" aria-hidden="true"> • </span>';
    return (
      `<span class="alloc-strip-fcm-key-item" style="--fa-fcm-accent:${c}">` +

      `<span class="alloc-strip-fcm-band-name">${client}</span>` +
      bullet +
      `<span class="fa-fcm-key-muted">${acct}</span>` +
      bullet +
      `<span class="fa-fcm-key-muted">${aum}</span>` +
      `</span></span>`
    );
  });
  return `<div class="alloc-strip-fcm-key" role="note">${items.join('')}</div>`;
}

/**
 * @param {number|string} value
 * @param {{acctNum:string,ci:number}} rule
 * @param {{orderId?:string,monthLabel:string,monthSep?:boolean,editable?:boolean,readOpacity?:number,fontWeight600?:boolean,parentOrderIds?:string[]}} opts
 */
function allocStripFcmCell(value, rule, opts) {
  const { orderId, monthLabel, monthSep, editable, readOpacity, fontWeight600, parentOrderIds } = opts;
  const ms = allocStripMonthSepClass(!!monthSep);
  const color = COLORS[rule.ci];
  const sa = allocStripQuoteAttr(rule.acctNum);
  const sl = allocStripQuoteAttr(monthLabel);
  const displayVal = value === '' || value == null ? '' : String(value);
  const valAttr = allocStripEscapeInputValueAttr(displayVal);
  const placeholder = displayVal === '' ? '\u2014' : '';
  const extras = (fontWeight600 ? ';font-weight:600' : '') + (readOpacity != null ? `;opacity:${readOpacity}` : '');
  const inputStyle = allocStripInputStyle(color) + extras;
  const stop = ` onclick="event.stopPropagation()"`;
  const oid = orderId ? allocStripQuoteAttr(orderId) : '';
  const writable = Boolean(editable && orderId);
  if (parentOrderIds && parentOrderIds.length) {
    const idsJs = parentOrderIds.map(id => `'${allocStripQuoteAttr(id)}'`).join(',');
    return `<td class="r alloc-strip-col-rsep alloc-strip-fcm-col${ms}"><input type="text" inputmode="numeric" autocomplete="off" class="alloc-strip-fcm-input" value="${valAttr}" placeholder="${placeholder}" style="${inputStyle}" onchange="setStripLotsParentGroup([${idsJs}],'${sa}','${sl}',this.value)"${stop}></td>`;
  }
  if (writable) {
    return `<td class="r alloc-strip-col-rsep alloc-strip-fcm-col${ms}"><input type="text" inputmode="numeric" autocomplete="off" class="alloc-strip-fcm-input" value="${valAttr}" placeholder="${placeholder}" style="${inputStyle}" onchange="setStripLots('${oid}','${sa}','${sl}',this.value)"${stop}></td>`;
  }
  return `<td class="r alloc-strip-col-rsep alloc-strip-fcm-col${ms}"><input type="text" readonly tabindex="-1" class="alloc-strip-fcm-input alloc-strip-fcm-input--readonly" value="${valAttr}" placeholder="${placeholder}" style="${inputStyle};cursor:default"${stop}></td>`;
}

/** Per-trade (detail) rows: FCM cells show "-" (splits edited on parent summary; subtotal shows totals). */
function allocStripFcmTradeDashCells(activeRules, monthSep) {
  const ms = allocStripMonthSepClass(!!monthSep);
  return activeRules
    .map(r => {
      const c = COLORS[r.ci];
      return `<td class="r mono alloc-strip-col-rsep alloc-strip-fcm-col alloc-strip-fcm-trade-dash${ms}" style="color:${c};font-weight:600" onclick="event.stopPropagation()">-</td>`;
    })
    .join('');
}

/** FCM totals as plain text (not inputs): subtotal row, or finalized parent summary row. */
function allocStripFcmSubtotalCell(value, rule, monthSep) {
  const c = COLORS[rule.ci];
  const display = value === '' || value == null ? '-' : String(value);
  const ms = monthSep === true ? allocStripMonthSepClass(true) : '';
  const valueHtml = allocStripEscapeHtml(display);
  return `<td class="r mono alloc-strip-col-rsep alloc-strip-fcm-col alloc-strip-fcm-subtotal${ms}" style="color:${c};font-weight:600">${valueHtml}</td>`;
}

/** Parent trades grid: same pagination / fill-height pattern as Trades screen */
/** Match mock `orders` length (9) so no row is hidden on page 1 */
const FA_TRADES_PAGE_SIZE = 9;
let faTradesPageIndex = 0;
let faTradesFilterKeyCached = '';

function faTradesFilterKey() {
  return document.getElementById('fa-trades-refine-input')?.value || '';
}

function updateFaTradesPagination(total, pageIndex, pageSize) {
  const wrap = document.querySelector('.fa-trades-table-wrapper');
  const maxPage = Math.max(0, Math.ceil(total / pageSize) - 1);
  if (wrap) {
    wrap.dataset.maxPage = String(maxPage);
    wrap.dataset.total = String(total);
  }
  const from = total === 0 ? 0 : pageIndex * pageSize + 1;
  const to = Math.min(total, (pageIndex + 1) * pageSize);
  const pt = document.getElementById('fa-trades-pagination-text');
  if (pt) pt.textContent = from + ' to ' + to + ' of ' + total;
  const pp = document.getElementById('fa-trades-pagination-page');
  const numPages = total === 0 ? 1 : maxPage + 1;
  if (pp) pp.textContent = 'Page ' + (total === 0 ? 1 : pageIndex + 1) + ' of ' + numPages;
  const dFirst = pageIndex <= 0 || total === 0;
  const dLast = pageIndex >= maxPage || total === 0;
  const elFirst = document.getElementById('fa-trades-page-first');
  const elPrev = document.getElementById('fa-trades-page-prev');
  const elNext = document.getElementById('fa-trades-page-next');
  const elLast = document.getElementById('fa-trades-page-last');
  if (elFirst) elFirst.disabled = dFirst;
  if (elPrev) elPrev.disabled = dFirst;
  if (elNext) elNext.disabled = dLast;
  if (elLast) elLast.disabled = dLast;
}

/** Widen / restore default width for Parent Trades (left) pane; icon reflects state. */
function faToggleParentTradesPaneWidth(ev) {
  if (ev && ev.preventDefault) ev.preventDefault();
  const panel = document.getElementById('panel-orders');
  if (!panel) return;
  const leftPane = panel.querySelector('.split-left');
  const rightPane = panel.querySelector('.split-right');
  const split = panel.querySelector('.split');
  const btn = document.getElementById('fa-parent-trades-pane-toggle');
  if (!leftPane || !rightPane || !split || !btn) return;

  const icon = btn.querySelector('i');
  const expanded = btn.getAttribute('aria-pressed') === 'true';
  const widePx = 520;

  if (expanded) {
    leftPane.style.width = '';
    leftPane.style.flex = '';
    rightPane.style.flex = '';
    leftPane.classList.remove('fa-split-left-trades--expanded');
    btn.setAttribute('aria-pressed', 'false');
    btn.title = 'Widen parent trades panel';
    btn.setAttribute('aria-label', 'Widen parent trades panel');
    if (icon) {
      icon.classList.remove('fa-angles-left');
      icon.classList.add('fa-angles-right');
    }
  } else {
    const splitWidth = split.getBoundingClientRect().width;
    const minLeft = 220;
    const maxLeft = Math.max(minLeft, splitWidth - 340);
    const next = Math.min(widePx, maxLeft);
    leftPane.style.width = next + 'px';
    leftPane.style.flex = '0 0 ' + next + 'px';
    rightPane.style.flex = '1 1 auto';
    leftPane.classList.add('fa-split-left-trades--expanded');
    btn.setAttribute('aria-pressed', 'true');
    btn.title = 'Restore default panel width';
    btn.setAttribute('aria-label', 'Restore default panel width');
    if (icon) {
      icon.classList.remove('fa-angles-right');
      icon.classList.add('fa-angles-left');
    }
  }
}

function faTradesPageFirst() {
  faTradesPageIndex = 0;
  renderTradesList();
}

function faTradesPagePrev() {
  if (faTradesPageIndex > 0) {
    faTradesPageIndex--;
    renderTradesList();
  }
}

function faTradesPageNext() {
  const wrap = document.querySelector('.fa-trades-table-wrapper');
  const maxPage = parseInt(wrap?.dataset.maxPage || '0', 10);
  if (faTradesPageIndex < maxPage) {
    faTradesPageIndex++;
    renderTradesList();
  }
}

function faTradesPageLast() {
  const wrap = document.querySelector('.fa-trades-table-wrapper');
  const maxPage = parseInt(wrap?.dataset.maxPage || '0', 10);
  faTradesPageIndex = maxPage;
  renderTradesList();
}

// ─── Allocation calendar (shared as-of-picker + FA status legend) ─────────────
const MOCKUP_TODAY = new Date(2026, 2, 26); // Mar 26, 2026 — aligns with date trigger + mock “today”
const _MONTH_NUM = {Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
function parseMockupDate(str) {
  const m = (str||'').match(/(\w{3})\s+(\d+),\s+(\d{4})/);
  return m ? new Date(+m[3], _MONTH_NUM[m[1]], +m[2]) : null;
}

let faAsOfPickerInstance = null;

function renderFaAllocCalendar(instance) {
  instance = instance || faAsOfPickerInstance;
  if (!instance || !instance.gridEl) return;

  const dateStatus = {};
  orders.forEach(o => {
    const d = parseMockupDate(o.date);
    if (!d) return;
    const key = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    if (!dateStatus[key]) dateStatus[key] = 'ok';
    if (o.status === 'pending') dateStatus[key] = 'bad';
  });

  const view = instance.viewDate;
  const year = view.getFullYear();
  const month = view.getMonth();
  const firstDow = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const DOWS = ['Su','Mo','Tu','We','Th','Fr','Sa'];
  const selected = instance.selectedDate;
  const todayD = MOCKUP_TODAY.getDate();
  const todayM = MOCKUP_TODAY.getMonth();
  const todayY = MOCKUP_TODAY.getFullYear();

  let html = DOWS.map(d => `<div class="as-of-picker__cal-dow">${d}</div>`).join('');
  for (let i = 0; i < firstDow; i++) html += '<div></div>';

  for (let day = 1; day <= daysInMonth; day++) {
    const key = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const status = dateStatus[key];
    const isToday = day === todayD && month === todayM && year === todayY;
    const isSelected = day === selected.getDate() && month === selected.getMonth() && year === selected.getFullYear();
    const cls = ['as-of-picker__cal-day'];
    if (status === 'ok') cls.push('c-ok');
    else if (status === 'bad') cls.push('c-bad');
    if (isToday) cls.push('is-today');
    if (isSelected) cls.push('is-selected');
    const title = status === 'ok' ? 'All finalized' : status === 'bad' ? 'Has unfinalized trades' : '';
    html += `<button type="button" class="${cls.join(' ')}" data-as-of-day="${day}" title="${title}">${day}</button>`;
  }

  instance.gridEl.innerHTML = html;
  if (instance.monthLabelEl) {
    instance.monthLabelEl.textContent = view.toLocaleString('en-US', { month: 'long', year: 'numeric' });
  }
}

/** Split mock price string e.g. "3.2650 $/MMBtu" → numeric + UOM */
function faParentTradePriceParts(priceStr) {
  const s = String(priceStr || '').trim();
  const m = s.match(/^([\d.,]+)\s+(.+)$/);
  if (m) return { num: m[1], uom: m[2].trim() };
  if (/^[\d.,]/.test(s)) return { num: s, uom: '—' };
  return { num: '—', uom: s || '—' };
}

/** Single month or range from contractRange label (en dash or em dash). */
function faParentTradeTenorFromRange(contractRange) {
  const r = String(contractRange || '').trim();
  if (!r) return { start: '—', end: '—' };
  const parts = r.split(/\s*[–—]\s*/).map(p => p.trim()).filter(Boolean);
  if (parts.length >= 2) return { start: parts[0], end: parts[parts.length - 1] };
  return { start: r, end: r };
}

/** [SYM] stripped product name — matches bracket + short-name pattern used on FA grids */
function faParentTradeProductCellHtml(o) {
  const symRaw = (o.short || '').split(/\s+/)[0] || '—';
  let namePart = (o.product || '').split('·')[0].trim();
  namePart = namePart.replace(/\s*\([^)]*\)\s*$/, '').trim();
  if (!namePart) namePart = (o.product || '').split('·')[0].trim() || (o.short || '');
  const sym = allocStripEscapeHtml(symRaw);
  const nm = allocStripEscapeHtml(namePart);
  return '<span class="product-label fa-trades-product-label">' +
    '<span class="bracket">[</span><span class="short-name">' + sym + '</span><span class="bracket">]</span> ' + nm +
    '</span>';
}

/** Strip aggregate row product cell: first order in group, or bracket-only fallback by ticker key. */
function allocStripProductHtmlForCell(ordersInCell, prodKey) {
  if (ordersInCell.length) return faParentTradeProductCellHtml(ordersInCell[0]);
  return (
    '<span class="product-label fa-trades-product-label">' +
    '<span class="bracket">[</span><span class="short-name">' +
    allocStripEscapeHtml(prodKey) +
    '</span><span class="bracket">]</span></span>'
  );
}

/** Same behavior as Trades / Market Data: icon toggles search vs refine + Apply visibility. */
function toggleRefineMode(section) {
  const prefix = section ? section + '-' : '';
  const icon = document.getElementById(prefix + 'refine-toggle-icon');
  const input = document.getElementById(prefix + 'refine-input');
  const applyBtn = document.getElementById(prefix + 'refine-apply-btn');
  if (!icon || !input || !applyBtn) return;
  const iconElement = icon.querySelector('i');
  const isFilterMode = iconElement.classList.contains('fa-filter');
  if (isFilterMode) {
    iconElement.classList.remove('fa-filter');
    iconElement.classList.add('fa-search');
    input.placeholder = 'Search current results';
    applyBtn.style.display = 'none';
  } else {
    iconElement.classList.remove('fa-search');
    iconElement.classList.add('fa-filter');
    input.placeholder = 'Refine current results';
    applyBtn.style.display = '';
  }
}

function renderTradesList() {
  const fk = faTradesFilterKey();
  if (fk !== faTradesFilterKeyCached) {
    faTradesPageIndex = 0;
    faTradesFilterKeyCached = fk;
  }

  const pending = orders.filter(o => o.status === 'pending').length;
  const pendingAnchor = document.getElementById('trades-pending-badge-anchor');
  const pendingTip = document.getElementById('trades-pending-tooltip');
  const pendingBadge = document.getElementById('trades-pending-count');
  if (pendingAnchor && pendingTip && pendingBadge) {
    if (pending === 0) {
      pendingAnchor.hidden = true;
      pendingTip.removeAttribute('data-tooltip');
      pendingTip.removeAttribute('aria-label');
      pendingBadge.textContent = '';
    } else {
      pendingAnchor.hidden = false;
      const tip = pending + ' unfinalized';
      pendingTip.setAttribute('data-tooltip', tip);
      pendingTip.setAttribute('aria-label', tip);
      pendingBadge.textContent = String(pending);
    }
  }
  const tcOrdersEl = document.getElementById('tc-orders');
  if (tcOrdersEl) tcOrdersEl.textContent = orders.length;
  const nbEl = document.getElementById('nav-badge-alloc');
  if (nbEl) nbEl.textContent = pending;

  renderFaAllocCalendar();

  const refine = (document.getElementById('fa-trades-refine-input')?.value || '').toLowerCase().trim();
  const visible = refine
    ? orders.filter(o =>
        o.id.toLowerCase().includes(refine) ||
        o.short.toLowerCase().includes(refine) ||
        (o.product && o.product.toLowerCase().includes(refine)) ||
        (o.dir && o.dir.toLowerCase().includes(refine))
      )
    : orders;

  const total = visible.length;
  const maxPage = Math.max(0, Math.ceil(total / FA_TRADES_PAGE_SIZE) - 1);
  faTradesPageIndex = Math.min(Math.max(0, faTradesPageIndex), maxPage);
  const pageSlice = total
    ? visible.slice(faTradesPageIndex * FA_TRADES_PAGE_SIZE, faTradesPageIndex * FA_TRADES_PAGE_SIZE + FA_TRADES_PAGE_SIZE)
    : [];

  const tbody = document.getElementById('fa-trades-grid-body');
  if (!tbody) return;

  if (!total) {
    tbody.innerHTML =
      '<tr class="fa-trades-empty-row"><td colspan="9" class="fa-trades-grid-empty">No trades match filters.</td></tr>';

    return;

  const rows = pageSlice.map(o => {
    const isPending = o.status === 'pending';
    const dotColor = isPending ? 'var(--fa-pending-amber)' : 'var(--color-green)';
    const dirColor = o.dir === 'Buy' ? 'var(--success)' : 'var(--danger)';
    const safeId = o.id.replace(/'/g, "\\'");
    const pp = faParentTradePriceParts(o.price);

// ─── Strip view ───────────────────────────────────────────────────────────────
const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function getMonthLabels(order) {
  const r = order.contractRange;
  if (/^\w+\s+\d{4}$/.test(r)) return [r];
  const m = r.match(/^(\w+)\s+[–-]\s+(\w+)\s+(\d{4})$/);
  if (m) {
    const s = MONTH_NAMES.indexOf(m[1]), e = MONTH_NAMES.indexOf(m[2]), yr = m[3];
    const res = [];
    for (let i = s; i <= e; i++) res.push(MONTH_NAMES[i] + ' ' + yr);
    return res;
  }
  return [r];
}

function sortMonthLabels(labels) {
  return [...new Set(labels)].sort((a, b) => {
    const [aM, aY] = a.split(' '), [bM, bY] = b.split(' ');
    return aY !== bY ? parseInt(aY) - parseInt(bY) : MONTH_NAMES.indexOf(aM) - MONTH_NAMES.indexOf(bM);
  });
}

// Group: book → monthLabel → productKey → [orders]
function buildStripByBook(filteredOrders) {
  const byBook = {};
  filteredOrders.forEach(o => {
    const prod = o.short.split(' ')[0];
    if (!byBook[o.book]) byBook[o.book] = {};
    getMonthLabels(o).forEach(label => {
      if (!byBook[o.book][label]) byBook[o.book][label] = {};
      if (!byBook[o.book][label][prod]) byBook[o.book][label][prod] = [];
      byBook[o.book][label][prod].push(o);
    });
  });
  return byBook;
}

/** True when a fill record's contract applies to this strip month row. */
function allocStripFillContractMatchesMonth(fillContract, order, monthLabel) {
  const fc = String(fillContract ?? '').trim();
  if (!fc || !monthLabel) return false;
  if (fc === monthLabel) return true;
  const months = getMonthLabels(order);
  if (months.length === 1 && fc === String(order.contractRange ?? '').trim()) return true;
  return false;
}

/** Parent summary row uses read-only FCM subtotals when every order in the cell is finalized. */
function allocStripParentRowUsesFinalizedFcmCells(ordersInCell) {
  return ordersInCell.length > 0 && ordersInCell.every(o => o.status === 'finalized');
}

let expandedStrip = new Set();
const stripEdits = {}; // "orderId|acctNum|monthLabel" → overridden lot count
/** True after user changes a writable strip FCM lot input (shows Save Allocations). */
let faAllocStripFcmDirty = false;

function faAllocSyncSaveAllocationsButton() {
  const btn = document.getElementById('fa-alloc-save-allocations');

function getStripLots(o, acctNum, monthLabel) {
  const k = `${o.id}|${acctNum}|${monthLabel}`;
  if (k in stripEdits) return stripEdits[k];
  const bookKey = BOOK_LEV_KEY[o.book];
  if (bookKey) {
    const ticker = o.short.split(' ')[0];
    const splits = computeTickerSplit(bookKey, ticker);
    if (splits && acctNum in splits) return Math.round(o.lotsPerMonth * splits[acctNum]);
  }
  const line = o.lines.find(l => l.acctNum === acctNum);
  return line ? Math.round(o.lotsPerMonth * line.target) : 0;
}

function setStripLots(orderId, acctNum, monthLabel, val) {
  stripEdits[`${orderId}|${acctNum}|${monthLabel}`] = Math.max(0, parseInt(val, 10) || 0);
  faAllocMarkStripFcmDirty();
  renderStrip();
}

/** Parent summary row: distribute account lots across orders in the cell (by lots/mo), then refresh. */
function setStripLotsParentGroup(orderIds, acctNum, monthLabel, val) {
  const target = Math.max(0, parseInt(val, 10) || 0);
  const list = orders.filter(o => orderIds.includes(o.id));
  if (!list.length) {
    renderStrip();
    return;
  }
  const totalLots = list.reduce((s, o) => s + o.lotsPerMonth, 0);
  if (totalLots <= 0) {
    list.forEach(o => {
      stripEdits[`${o.id}|${acctNum}|${monthLabel}`] = 0;
    });
    faAllocMarkStripFcmDirty();
    renderStrip();
    return;
  }
  let remaining = target;
  list.forEach((o, i) => {
    const k = `${o.id}|${acctNum}|${monthLabel}`;
    if (i === list.length - 1) {
      stripEdits[k] = Math.max(0, remaining);
    } else {
      const x = Math.round((target * o.lotsPerMonth) / totalLots);
      stripEdits[k] = x;
      remaining -= x;
    }
  });
  faAllocMarkStripFcmDirty();
  renderStrip();
}

function getFaStripFilterState() {
  return { dir: '', product: '', status: '' };
}

/** Summary row keys `${book}|${monthLabel}|${prod}` for this book under current strip filters. */
function collectAllocStripKeysForBook(book) {
  const { dir: dirF, product: prodF, status: statF } = getFaStripFilterState();
  const filtered = orders.filter(
    o =>
      (!dirF || o.dir === dirF) &&
      (!prodF || o.product.includes(prodF)) &&
      (!statF || o.status === statF)
  );
  const monthMap = buildStripByBook(filtered)[book];
  if (!monthMap) return [];
  const keys = [];
  sortMonthLabels(Object.keys(monthMap)).forEach(label => {
    const prodMap = monthMap[label];
    Object.keys(prodMap)
      .sort()
      .forEach(prod => {
        keys.push(`${book}|${label}|${prod}`);
      });
  });
  return keys;
}

/** @param {string} book */
function renderStripRowsForBook(book, monthMap, activeRules) {
  const sortedMonths = sortMonthLabels(Object.keys(monthMap));
  let rows = '';
  sortedMonths.forEach((label, mIdx) => {
    const prodMap = monthMap[label];
    const prods = Object.keys(prodMap).sort();

    prods.forEach((prod, pi) => {
      const ordersInCell = prodMap[prod];
      const key = `${book}|${label}|${prod}`;
      const safeKey = key.replace(/'/g, "\\'");
      const expanded = expandedStrip.has(key);
      const monthSep = pi === 0 && mIdx > 0;

      let total = 0;
      const fcmTotals = activeRules.map(() => 0);
      let wValue = 0;
      let wUnit = null;
      let wMix = false;
      ordersInCell.forEach(o => {
        total += o.lotsPerMonth;
        activeRules.forEach((r, ri) => {
          fcmTotals[ri] += getStripLots(o, r.acctNum, label);
        });
        const pm = o.price.match(/^([\d.]+)\s+(.+)$/);
        if (pm) {
          if (!wUnit) wUnit = pm[2];
          else if (wUnit !== pm[2]) wMix = true;
          wValue += parseFloat(pm[1]) * o.lotsPerMonth;
        }
      });

      const avgPx = total > 0 && !wMix && wUnit ? wValue / total : null;
      const avgNumHtml = allocStripAvgNumHtml(avgPx);
      const uomHtml = allocStripUomHtml(avgPx != null && wUnit ? wUnit : null);
      const diff = total - fcmTotals.reduce((s, v) => s + v, 0);

      const hasPending = ordersInCell.some(o => o.status === 'pending');
      const allFinalizedForFills = allocStripParentRowUsesFinalizedFcmCells(ordersInCell);
      const fillRowsForCell = allFinalizedForFills
        ? allocStripCollectFillsForCell(ordersInCell, label, activeRules)
        : [];
      const fillTradesCellHtml = allocStripFillTradesCellHtml(
        book,
        label,
        prod,
        fillRowsForCell.length,
        monthSep
      );
      const statusHtml = allocStripAggregateStatusHtml(hasPending);

      const ms = monthSep;

      const allFinalized = allocStripParentRowUsesFinalizedFcmCells(ordersInCell);
      const parentOrderIds = ordersInCell.map(o => o.id);
      const fcmCells = fcmTotals
        .map((v, i) => {
          const r = activeRules[i];
          if (allFinalized) {
            return allocStripFcmSubtotalCell(v, r, ms);
          }
          return allocStripFcmCell(v, r, {
            monthLabel: label,
            monthSep: ms,
            parentOrderIds,
          });
        })
        .join('');

      const productCellHtml = allocStripProductHtmlForCell(ordersInCell, prod);
      const expandIcon = allocStripExpandIcon(expanded);
      const msCls = allocStripMonthSepClass(ms);
      const sepAttr = ms ? ' class="alloc-strip-month-sep"' : '';

      rows += `<tr class="alloc-strip-summary-row" onclick="toggleStrip('${safeKey}')" aria-expanded="${expanded}">
          <td colspan="2" class="alloc-strip-summary-month alloc-strip-summary-menu-month${msCls}"><span class="alloc-strip-month-toggle">${expandIcon}${label}</span></td>
          <td${sepAttr}>${productCellHtml}</td>
          <td class="r mono alloc-strip-summary-total${msCls}">${total}</td>
          <td class="r alloc-strip-avg-cell${msCls}">${avgNumHtml}</td>
          <td class="alloc-strip-col-rsep alloc-strip-uom-cell${msCls}">${uomHtml}</td>
          ${fcmCells}
          ${allocStripLeftoverCell(diff, ms)}
          ${fillTradesCellHtml}
          <td class="alloc-strip-status-cell${ms ? ' alloc-strip-month-sep' : ''}">${statusHtml}</td>
        </tr>`;

      if (expanded) {
        ordersInCell.forEach((o, di) => {
          const oFcmCells = allocStripFcmTradeDashCells(activeRules, false);
          const oSum = activeRules.reduce((s, r) => s + getStripLots(o, r.acctNum, label), 0);
          const oDiff = o.lotsPerMonth - oSum;
          const pp = allocStripParseTradePrice(o.price);
          const detailPriceNum =
            pp.num != null
              ? `<span class="mono">${allocStripEscapeHtml(pp.num)}</span>`
              : allocStripEscapeHtml(o.price);
          const detailUom =
            pp.unit != null ? allocStripEscapeHtml(faUomColumnDisplay(pp.unit)) || '—' : '—';
          rows += `<tr class="alloc-strip-detail-row ${allocStripExpStripeClass(di)}">
              ${allocStripTradeMenuCell(o.id, false)}
              <td class="alloc-strip-detail-id">${o.id}</td>
              <td>${faParentTradeProductCellHtml(o)}</td>
              <td class="r mono fa-strip-detail-lots">${o.lotsPerMonth}</td>
              <td class="r alloc-strip-detail-price">${detailPriceNum}</td>
              <td class="alloc-strip-col-rsep alloc-strip-uom-cell">${detailUom}</td>
              ${oFcmCells}
              ${allocStripLeftoverCell(oDiff, false, { tradeRow: true })}
              <td class="alloc-strip-fill-trades-cell">-</td>
              <td class="alloc-strip-status-cell">-</td>
            </tr>`;
        });
        const tickerSplits = BOOK_LEV_KEY[book] ? computeTickerSplit(BOOK_LEV_KEY[book], prod) : null;
        rows += `<tr class="alloc-strip-subtotal-row">
            ${allocStripTradeMenuEmptyCell(false)}
            <td class="alloc-strip-subtotal-label">Subtotal:</td>
            <td>${productCellHtml}</td>
            <td class="r mono alloc-strip-summary-total">${total}</td>
            <td class="r alloc-strip-avg-cell">${avgNumHtml}</td>
            <td class="alloc-strip-col-rsep alloc-strip-uom-cell">${uomHtml}</td>
            ${activeRules.map((r, i) => allocStripFcmSubtotalCell(fcmTotals[i], r)).join('')}
            ${allocStripLeftoverCell(diff, false)}
            <td class="alloc-strip-fill-trades-cell"></td>
            <td class="alloc-strip-status-cell"></td>
          </tr>`;
        const aeFcmCells = activeRules
          .map((r, i) => {
            const actualPct = total > 0 ? ((fcmTotals[i] / total) * 100).toFixed(0) : '0';
            const expPct = tickerSplits ? (tickerSplits[r.acctNum] * 100).toFixed(0) : (r.target * 100).toFixed(0);
            const c = COLORS[r.ci] != null ? COLORS[r.ci] : 'var(--muted)';
            return `<td class="r mono alloc-strip-col-rsep alloc-strip-fcm-col alloc-strip-ae-fcm"><span class="fa-tooltip-wrap" data-tooltip="Actual / Expected"><span class="alloc-strip-ae-pair" style="color:${c}">${actualPct}%<span class="alloc-strip-ae-sep"> / </span>${expPct}%</span></span></td>`;
          })
          .join('');
        rows += `<tr class="alloc-strip-ae-row" aria-label="Actual and expected allocation by account">
            <td colspan="6" class="alloc-strip-col-rsep" aria-hidden="true"></td>
            ${aeFcmCells}
            <td class="r alloc-strip-ae-skip"></td>
            <td class="alloc-strip-fill-trades-cell alloc-strip-ae-skip"></td>
            <td class="alloc-strip-status-cell alloc-strip-ae-skip"></td>
          </tr>`;
      }
    });
  });
  return rows;
}

function renderStrip() {
  const { dir: dirF, product: prodF, status: statF } = getFaStripFilterState();

  const filtered = orders.filter(
    o =>
      (!dirF || o.dir === dirF) &&
      (!prodF || o.product.includes(prodF)) &&
      (!statF || o.status === statF)
  );

  const byBook = buildStripByBook(filtered);
  const container = document.querySelector('.fa-alloc-strip-scroll');
  if (!container) return;

  Object.keys(BOOK_RULES)
    .filter(book => byBook[book])
    .forEach(book => {
      if (typeof faEnsureAllocStripBookCardDefaultCollapsed === 'function') {
        faEnsureAllocStripBookCardDefaultCollapsed('strip|' + book);
      }
    });

  const html = Object.keys(BOOK_RULES)
    .filter(book => byBook[book])
    .map(book => {
      const activeRules = (BOOK_RULES[book] || []).filter(r => r.status !== 'retired');
      const rows = renderStripRowsForBook(book, byBook[book], activeRules);
      return allocStripBookSectionHtml(book, activeRules, rows);
    })
    .join('');

  container.innerHTML = html || '<div class="alloc-strip-empty-state">No data matches the current filters.</div>';
  if (typeof faSyncAllBookCardCollapse === 'function') faSyncAllBookCardCollapse(container);
  faRefreshAllocStripAllExpandCollapseUi();
  if (typeof renderTrueup === 'function') renderTrueup();
}

function toggleStrip(key) {
  if (expandedStrip.has(key)) expandedStrip.delete(key); else expandedStrip.add(key);
  renderStrip();
}

function faAllocStripExpandAllInBook(book) {
  collectAllocStripKeysForBook(book).forEach(k => expandedStrip.add(k));
  renderStrip();
}

function faAllocStripCollapseAllInBook(book) {
  const prefix = `${book}|`;
  [...expandedStrip].forEach(k => {
    if (k.startsWith(prefix)) expandedStrip.delete(k);
  });
  renderStrip();
}

function faRefreshAllocStripExpandCollapseButtons() {
  const root = document.querySelector('.fa-alloc-strip-scroll');
  const expandBtn = document.getElementById('fa-alloc-strip-expand-all');
  const collapseBtn = document.getElementById('fa-alloc-strip-collapse-all');
  if (!expandBtn || !collapseBtn) return;
  if (!root) {
    expandBtn.disabled = true;
    collapseBtn.disabled = true;
    return;
  }
  const sections = root.querySelectorAll('[data-fa-book-card]');
  const n = sections.length;
  if (n === 0) {
    expandBtn.disabled = true;
    collapseBtn.disabled = true;
    return;
  }
  let collapsedCount = 0;
  sections.forEach(sec => {
    const id = sec.getAttribute('data-fa-book-card');
    if (id && typeof faBookCardIsCollapsed === 'function' && faBookCardIsCollapsed(id)) collapsedCount++;
  });
  expandBtn.disabled = collapsedCount === 0;
  collapseBtn.disabled = collapsedCount === n;
}

/** Per-book strip summary rows: same disable pattern as top-level Expand/Collapse (book cards). */
function faRefreshAllocStripPerBookRowButtons() {
  const root = document.querySelector('.fa-alloc-strip-scroll');
  if (!root) return;
  root.querySelectorAll('[data-fa-book-card]').forEach(sec => {
    const cardId = sec.getAttribute('data-fa-book-card') || '';
    if (!cardId.startsWith('strip|')) return;
    const book = cardId.slice('strip|'.length);
    const slug = allocStripBookSlug(book);
    const expandBtn = document.getElementById(`fa-strip-row-expand-${slug}`);
    const collapseBtn = document.getElementById(`fa-strip-row-collapse-${slug}`);
    if (!expandBtn || !collapseBtn) return;
    const keys = collectAllocStripKeysForBook(book);
    if (keys.length === 0) {
      expandBtn.disabled = true;
      collapseBtn.disabled = true;
      return;
    }
    let expandedCount = 0;
    keys.forEach(k => {
      if (expandedStrip.has(k)) expandedCount++;
    });
    expandBtn.disabled = expandedCount === keys.length;
    collapseBtn.disabled = expandedCount === 0;
  });
}

const BOOK_LEV_KEY = { '#GH5600':'energy', '#GH5601':'gas', '#GH5603':'crude' };

// Returns { acctNum: splitFraction } for a given book + ticker symbol.
// Falls back to the "All other tickers" default row if the ticker isn't configured.
function computeTickerSplit(bookKey, tickerSym) {
  const cfg  = TICKER_LEV_DATA[bookKey];
  const book = AUM_BOOKS[bookKey];
  if (!cfg || !book) return null;
  const rules = (BOOK_RULES[book.bookName] || []).filter(r => r.status === 'active');
  const levRow = cfg.tickers.find(t => t.symbol === tickerSym)?.lev ?? cfg.default;
  const total  = rules.reduce((s, r) => s + (AUM_DATA[r.acctNum]?.aum || 0) * (levRow[r.acctNum] || 1), 0);
  if (!total) return null;
  const out = {};
  rules.forEach(r => { out[r.acctNum] = (AUM_DATA[r.acctNum]?.aum || 0) * (levRow[r.acctNum] || 1) / total; });
  return out;
}

function _faAllocApplyFinalize(o) {
  o.status = 'finalized';
  o.finalizedAt = 'Today ' + new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
  o.finalizedBy = 'J. Smith';
  const bookKey = BOOK_LEV_KEY[o.book];
  const ticker = o.short.split(' ')[0];
  const splits = bookKey ? computeTickerSplit(bookKey, ticker) : null;
  const monthLabels = getMonthLabels(o);
  const orderIdx = orders.indexOf(o);
  const fills = [];
  let fillSeq = 0;
  o.lines.forEach(l => {
    const frac = splits ? (splits[l.acctNum] || 0) : (l.target || 0);
    const qtyPerMonth = Math.round(o.lotsPerMonth * frac);
    monthLabels.forEach(monthLabel => {
      fills.push({
        tradeId: 'TRD-' + (3000 + orderIdx * 100 + fillSeq),
        fcm: l.fcm,
        acctNum: l.acctNum,
        ci: l.ci,
        dir: o.dir,
        qty: qtyPerMonth,
        contract: monthLabel,
        entryPx: parseFloat(o.price),
        curvePx: parseFloat(o.price) * 1.04,
        unrealPnl: Math.round(qtyPerMonth * 10000 * 0.04),
        dayMtm: Math.round(qtyPerMonth * 1000 * 0.04),
        src: 'vendor',
        asOf: 'Today',
        updatedAt: 'Just now',
      });
      fillSeq += 1;
    });
  });
  o.fills = fills;
}

function trueupEscapeDataTooltip(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;')
    .replace(/</g, '&lt;');
}

function trueupEscapeHtml(s) {
  return String(s ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

/** One-line explanation for the active band only (matches cell coloring). */
function trueupBandTooltip(absDrift, kind) {
  if (absDrift < 1) {
    if (kind === 'actual') return 'Green — Actual share is within ±1% of target';
    if (kind === 'post') return 'Green — After this trade, projected share stays within ±1% of target';
    return 'Green — Drift from target is within ±1%';
  }
  if (absDrift < 3) {
    if (kind === 'actual') return 'Amber — Actual share is about 1–3% from target';
    if (kind === 'post') return 'Amber — After this trade, projected share is still about 1–3% from target';
    return 'Amber — Drift from target is about 1–3%';
  }
  if (kind === 'actual') return 'Red — Actual share is more than 3% from target';
  if (kind === 'post') return 'Red — After this trade, projected share is still over 3% from target';
  return 'Red — Drift from target is over 3%';
}

function trueupWrapColoredTip(innerHtml, tip) {
  if (!tip) return innerHtml;
  return `<span class="fa-tooltip-wrap fa-trueup-value-tip" data-tooltip="${trueupEscapeDataTooltip(tip)}">${innerHtml}</span>`;
}

function faTrueupToggleActionsMenu(ev, btn) {
  if (ev) ev.stopPropagation();
  var wrap = btn.closest('.fa-trueup-actions-menu-wrap');
  var dd = wrap && wrap.querySelector('.fa-trueup-actions-menu-dropdown');
  if (!dd) return;
  var isOpen = dd.classList.contains('open');
  faTrueupCloseAllActionMenus();
  if (!isOpen) {

    btn.setAttribute('aria-expanded', 'true');

}

<script>
(function initFaAllocOrdersSplitResize() {
  const targetPanel = document.getElementById('panel-orders');
  if (!targetPanel) return;
  const split = targetPanel.querySelector('.split');
  const leftPane = targetPanel.querySelector('.split-left');
  const rightPane = targetPanel.querySelector('.split-right');
  const handle = targetPanel.querySelector('#fa-orders-resize-handle');
  if (!split || !leftPane || !rightPane || !handle) return;

  let isResizing = false;
  let startX = 0;
  let startLeftWidth = 0;

  function onMove(event) {
    if (!isResizing) return;
    const deltaX = event.clientX - startX;
    const splitWidth = split.getBoundingClientRect().width;
    const minLeft = 220;
    const maxLeft = Math.max(minLeft, splitWidth - 340);
    const next = Math.max(minLeft, Math.min(maxLeft, startLeftWidth + deltaX));
    leftPane.style.width = next + 'px';
    leftPane.style.flex = '0 0 ' + next + 'px';
    rightPane.style.flex = '1 1 auto';
    event.preventDefault();
  }

  function onUp() {
    if (!isResizing) return;
    isResizing = false;
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
  }

  handle.addEventListener('mousedown', function (event) {
    isResizing = true;
    startX = event.clientX;
    startLeftWidth = leftPane.getBoundingClientRect().width;
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
    event.preventDefault();
  });
})();
</script>
<script>
(function initFaAllocTabsTrueupRefresh() {
  var stack = document.querySelector('.fa-alloc-tabbed-section[data-tabs-stack]');
  if (!stack) return;

  function faApplyFundAllocTabFromHash() {
    if (typeof window.activateTabsStackPanel !== 'function') return;
    var h = (location.hash || '').replace(/^#/, '').toLowerCase();
    var panel =
      h === 'trueup' || h === 'true-up'
        ? 'trueup'
        : h === 'allocations' || h === 'alloc'
          ? 'allocations'
          : '';
    if (!panel) return;
    window.activateTabsStackPanel(panel, stack);
    if (panel === 'trueup' && typeof renderTrueup === 'function') {
      requestAnimationFrame(function () {
        renderTrueup();
      });
    }
  }

  stack.addEventListener('click', function (e) {
    if (!e.target.closest('.tabs-stack__tab')) return;
    requestAnimationFrame(function () {
      var tu = document.getElementById('fa-tab-panel-trueup');
      if (tu && tu.classList.contains('active') && typeof renderTrueup === 'function') renderTrueup();
    });
  });

  function deferred() {
    setTimeout(faApplyFundAllocTabFromHash, 0);
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', deferred);
  } else {
    deferred();
  }
  window.addEventListener('load', deferred, { once: true });
  window.addEventListener('hashchange', faApplyFundAllocTabFromHash);
})();
</script>
